<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    {% for post in posts %}
    <h2>
        <a href="{% url 'posts:detail' post.id %}">
            {{ post.title }}
        </a>
    </h2>

    <p>{{ post.content }}</p>

    <p>작성일- {{ post.created_at }}</p>

    {% if post.is_anonymous %}
        <p>작성자 - 익명</p>
    {% else %}
        <p>작성자 - {{ post.author.nickname }}</p>
    {% endif %}

    <br>
{% empty %}
    <p>작성한 글이 없습니다.</p>
{% endfor %}
</body>
</html>
