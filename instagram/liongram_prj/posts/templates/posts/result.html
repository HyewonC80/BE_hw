<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>검색 결과</title>
</head>
<body>
    <h1>"{{ keyword }}" - 검색 결과</h1>
    <hr>

    {% if posts %}
        {% for post in posts %}
            <a href="{% url 'posts:detail' post.id %}">
                <h3>{{ post.title }}</h3>
            </a>
            <p>{{ post.content }}</p>
            <hr>
        {% endfor %}
    {% else %}
        <p>검색된 글이 없습니다.</p>
    {% endif %}

    <a href="{% url 'posts:list' %}">목록으로 돌아가기</a>
</body>
</html>
