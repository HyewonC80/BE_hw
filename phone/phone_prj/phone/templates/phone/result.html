<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>"{{ keyword }}" 검색 결과 페이지 입니다.</h1>

<hr>
{% if results %}
    {% for contact in results %}
            <p><strong>이름 : {{ contact.name }}</strong></p>
            <p>전화번호 : {{ contact.phone_num }}</p>
        <hr>
    {% endfor %}

{% else %}
    <p>해당 검색어와 관련된 전화번호가 없습니다.</p>
    <hr>
{% endif %}

</body>
</html>
